<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONTROL MR | Panel Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="admin2.css">
    <script>
        const tienePermiso = sessionStorage.getItem("tokenSeguridadSMR");
        if (!tienePermiso) { window.location.replace("index.html"); }
    </script>
</head>
<body class="bg-light pb-5 mb-5">

<header class="header-dark d-flex justify-content-between align-items-center px-4 py-2 fixed-top z-3 shadow-sm">
    <div class="d-flex align-items-center gap-3">
        <img src="./WhatsApp Image 2026-02-05 at 4.45.12 PM (1).jpeg" alt="Logo MR" class="logo-mr">
        <span class="text-white fw-bold fs-5 titulo-header">CONTROL TÉCNICO</span>
    </div>
    <div class="dropdown">
        <button class="btn btn-usuario rounded-pill d-flex align-items-center gap-2 px-3 py-1" type="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5"></i>
            <span class="fw-semibold d-none d-sm-inline" id="userNameDisplay">Usuario</span>
            <i class="bi bi-caret-down-fill" style="font-size: 0.8rem;"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark shadow border-secondary">
            <li><a class="dropdown-item text-danger fw-bold" href="#" onclick="cerrarSesion()">Salir</a></li>
        </ul>
    </div>
</header>

<main class="container mt-5 pt-5">

    <section id="vista-asignacion" class="vista-app" style="display: block;">
        <div class="card shadow-sm border-dark mb-4 mt-2">
            <div class="card-body">
                <h5 class="card-title fw-bold mb-3 border-bottom pb-2 text-uppercase">Asignación Técnica</h5>
                <div class="mb-3">
                    <select id="asigZona" class="form-select border-dark" onchange="seleccionarTodasPorZona()">
                        <option value="" disabled selected>SELECCIONA LA ZONA</option>
                        <option value="Zona A">Zona A</option>
                        <option value="Zona B">Zona B</option>
                        <option value="Zona C">Zona C</option>
                        <option value="Zona D">Zona D</option>
                        <option value="Zona E">Zona E</option>
                        <option value="Carpinterias">Carpinterías</option>
                        <option value="Zona F">Zona F</option>
                    </select>
                </div>
                <div class="mb-3">
                    <input type="text" id="asigTecnico" class="form-control border-dark" placeholder="NOMBRE DEL TÉCNICO">
                </div>
                <div class="mb-3">
                    <select id="asigUnidades" class="form-select border-dark mb-3" onchange="agregarSucursalLista()">
                        <option value="" disabled selected>AGREGAR OTRA SUCURSAL...</option>
                    </select>
                    <div class="border border-dark rounded p-2 bg-white" style="min-height: 100px;" id="contenedor-sucursales">
                        <ul class="list-group list-group-flush" id="lista-sucursales-agregadas"></ul>
                    </div>
                </div>
                <button class="btn btn-dark w-100 fw-bold py-2 mt-2 shadow" onclick="ejecutarAsignacion(event)">GUARDAR ASIGNACIÓN</button>
            </div>
        </div>
    </section>

    <section id="vista-usuarios" class="vista-app" style="display: none;">
        <div class="card shadow-sm border-dark mb-4 mt-2">
            <div class="card-body"> 
                <h5 class="card-title fw-bold mb-3 border-bottom pb-2">NUEVO USUARIO</h5>               
                <div class="mb-3">
                    <input type="text" id="adminUser" class="form-control border-dark" placeholder="Nombre de Usuario">
                </div>
                <div class="mb-3">
                    <input type="password" id="adminPass" class="form-control border-dark" placeholder="NIP / Contraseña">
                </div>
                <div class="mb-3">
                    <select id="adminRol" class="form-select border-dark">
                        <option value="TECNICO">TECNICO</option>
                        <option value="AUXILIAR">AUXILIAR</option>
                         <option value="ADMINISTRADOR">ADMINISTRADOR</option>
                    </select>
                </div>
                <button class="btn btn-dark w-100 fw-bold py-2 mt-2 shadow" id="btnAlta" onclick="ejecutarAltaUsuario()">GUARDAR USUARIO</button>
            </div>
        </div>
    </section>

    <section id="vista-monitoreo" class="vista-app" style="display: none;">
        <div class="d-flex gap-2 mb-3 mt-2">
            <button id="btnAsistencia" class="btn btn-dark w-100 fw-bold" onclick="mostrarSubVistaMonitoreo('asistencia')">ASISTENCIA</button>
            <button id="btnVisitas" class="btn btn-outline-dark w-100 fw-bold" onclick="mostrarSubVistaMonitoreo('visitas')">VISITAS</button>
        </div>

        <div id="subvista-asistencia">
            <div class="table-responsive border border-dark rounded bg-white shadow-sm">
                <table class="table table-striped align-middle text-center m-0">
                    <thead class="table-dark">
                        <tr>
                            <th>NOMBRE</th>
                            <th>FALTAS</th>
                            <th>RETARDOS</th> <th>ASIST.</th>
                            <th>DETALLE</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-asistencia-body"></tbody>
                </table>
            </div>
        </div>

        <div id="subvista-visitas" style="display:none;">
            <div class="mb-3">
                <select id="filtroZonaVisitas" class="form-select border-dark" onchange="cargarVisitasPorZona()">
                    <option value="" disabled selected>SELECCIONA LA ZONA PARA VER VISITAS</option>
                    <option value="Zona A">Zona A</option>
                    <option value="Zona B">Zona B</option>
                    <option value="Zona C">Zona C</option>
                    <option value="Zona D">Zona D</option>
                    <option value="Zona E">Zona E</option>
                    <option value="Carpinterias">Carpinterías</option>
                    <option value="Zona F">Zona F</option>
                </select>
            </div>
            <div id="contenedor-cards-visitas"></div>
        </div>
    </section>
</main>

<div class="modal fade" id="modalAsistencia" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content border-dark border-2">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title fw-bold" id="modalTituloNombre">Reporte Detallado</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-light">
        <ul class="list-group" id="lista-detalle-quincena"></ul>
      </div>
    </div>
  </div>
</div>

<nav class="fixed-bottom bg-white border-top border-dark d-flex justify-content-around align-items-center py-2 shadow-lg z-3">
    <button class="btn btn-link text-dark text-decoration-none d-flex flex-column align-items-center w-100" onclick="cambiarVista('vista-asignacion')">
        <i class="bi bi-person-vcard fs-3"></i>
        <span class="small fw-bold">Asignación</span>
    </button>
    <button class="btn btn-link text-dark text-decoration-none d-flex flex-column align-items-center border-start border-end border-dark w-100" onclick="cambiarVista('vista-usuarios')">
        <i class="bi bi-tools fs-3"></i>
        <span class="small fw-bold">Usuarios</span>
    </button>
    <button class="btn btn-link text-dark text-decoration-none d-flex flex-column align-items-center w-100" onclick="cambiarVista('vista-monitoreo')">
        <i class="bi bi-search fs-3"></i>
        <span class="small fw-bold">Monitoreo</span>
    </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="admin2.js"></script>
</body>
</html>
