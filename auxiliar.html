<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Control Técnico | CONTROL MR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="auxiliar.css">
    
    <script>
        // Revisamos si existe el token en esta pestaña
        const tienePermiso = sessionStorage.getItem("tokenSeguridadSMR");

        // Si NO tiene el token (porque copió el link en otra ventana)
        if (!tienePermiso) {
            // Lo mandamos a volar a la página de login
            window.location.replace("index.html"); 
        }
    </script>
</head>
<body>

<header class="topbar shadow-sm">
    <div class="logo-container d-flex align-items-center">
        <img src="./WhatsApp Image 2026-02-05 at 4.45.12 PM (1).jpeg" alt="Logo" class="nav-logo me-2">
        <span class="title d-none d-md-inline fw-bold tracking-wide">CONTROL TÉCNICO</span>
    </div>

    <div class="user-menu-container d-flex align-items-center">
        <div class="dropdown">
            <button class="btn btn-user dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle me-1"></i>
                <span id="userNameDisplay">Usuario</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow">
                <li><h6 class="dropdown-header">Mi Cuenta</h6></li>
                
                <li>
                    <a class="dropdown-item text-danger fw-bold" href="index.html" onclick="cerrarSesion()">
                        <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
                    </a>
                </li>
            </ul>
        </div>
    </div>
</header>

<main class="content-area container-fluid mt-3 px-3">
    
    <section id="pantalla-iniciar" class="tab-content active col-12 col-md-8 col-lg-6 mx-auto card-section shadow-sm formal-style">
        <h4 class="section-title-formal text-center text-success"><i class="bi bi-box-arrow-in-right"></i> INICIAR JORNADA</h4>
        
        <div class="camera-box mx-auto position-relative">
            <video id="videoInicio" autoplay muted playsinline></video>
            <canvas id="canvasInicio" style="display:none;"></canvas>
            <img id="fotoInicio" style="display:none; width:100%; height:100%; object-fit:cover;" />
        </div>
        
        <div class="button-group d-grid gap-2 mt-3">
            <button class="btn-formal-black" id="btnIniJornada" onclick="iniciarJornada()">INICIAR Y ENVIAR</button>
            <button class="btn btn-danger btn-sm mt-2" onclick="borrarDatos('inicio')">BORRAR DATOS</button>
        </div>
        
        <div class="info-display bg-light p-3 mt-4 border">
            <p class="mb-1 small"><strong>Fecha:</strong> <span id="fechaInicio">--/--/----</span></p>
            <p class="mb-1 small"><strong>Hora:</strong> <span id="horaInicio">--:--</span></p>
            <p class="mb-1 small"><strong>GPS:</strong> <span id="ubicacionInicio">--</span></p>
        </div>
    </section>

    <section id="pantalla-finalizar" class="tab-content col-12 col-md-8 col-lg-6 mx-auto card-section shadow-sm formal-style">
        <h4 class="section-title-formal text-center text-danger"><i class="bi bi-box-arrow-right"></i> FIN DE JORNADA</h4>
        
        <div class="camera-box mx-auto position-relative">
            <video id="videoFin" autoplay muted playsinline></video>
            <canvas id="canvasFin" style="display:none;"></canvas>
            <img id="fotoFin" style="display:none; width:100%; height:100%; object-fit:cover;" />
        </div>
        
        <div class="button-group d-grid gap-2 mt-3">
            <button class="btn-formal-outline" id="btnFinJornada" onclick="finalizarJornada()">FINALIZAR Y ENVIAR</button>
            <button class="btn btn-danger btn-sm mt-2" onclick="borrarDatos('fin')">BORRAR DATOS</button>
        </div>
        
        <div class="info-display bg-light p-3 mt-4 border">
            <p class="mb-1 small"><strong>Fecha:</strong> <span id="fechaFin">--/--/----</span></p>
            <p class="mb-1 small"><strong>Hora:</strong> <span id="horaFin">--:--</span></p>
            <p class="mb-1 small"><strong>GPS:</strong> <span id="ubicacionFin">--</span></p>
        </div>
    </section>

    <section id="pantalla-visita" class="tab-content col-12 col-md-8 col-lg-6 mx-auto card-section shadow-sm formal-style">
        <h4 class="section-title-formal text-center text-primary"><i class="bi bi-geo-alt-fill"></i> VISITA A SUCURSAL</h4>
        
        <div class="mb-3">
            <label for="sucursalSelect" class="form-label-formal">SELECCIONA LA SUCURSAL:</label>
            <select class="form-select-formal" id="sucursalSelect">
                <option value="" selected disabled>-- Elige una sucursal --</option>
            </select>
            <span id="sucursalElegida" style="display: none;"></span>
        </div>

        <div class="camera-box mx-auto position-relative mb-3">
            <video id="videoVisita" autoplay muted playsinline></video>
            <canvas id="canvasVisita" style="display:none;"></canvas>
            <img id="fotoVisita" style="display:none; width:100%; height:100%; object-fit:cover;" />
        </div>
        
        <div class="button-group d-grid gap-2">
            <button class="btn-formal-black" id="btnIniVisita" onclick="iniciarVisita()">INICIAR VISITA</button>
            <button class="btn-formal-outline" id="btnFinVisita" onclick="finalizarVisita()" disabled>FINALIZAR VISITA</button>
        </div>

        <div class="info-display bg-light p-3 mt-4 border">
            <p class="mb-1 small"><strong>Entrada:</strong> <span id="horaVisitaInicio">--:--</span></p>
            <p class="mb-1 small"><strong>Salida:</strong> <span id="horaVisitaFin">--:--</span></p>
            <p class="mb-1 small"><strong>GPS:</strong> <span id="ubicacionVisita">--</span></p>
            <p class="mb-1 small mt-2"><strong>Estado:</strong> <span id="statusVisita" class="badge bg-secondary">Esperando...</span></p>
        </div>
    </section>

</main>

<nav class="bottom-nav shadow-lg">
    <button class="nav-btn active-btn" onclick="cambiarPestana('pantalla-iniciar', this)">
        <i class="bi bi-play-circle-fill"></i><span>Iniciar</span>
    </button>
    <button class="nav-btn" onclick="cambiarPestana('pantalla-finalizar', this)">
        <i class="bi bi-stop-circle"></i><span>Finalizar</span>
    </button>
    <button class="nav-btn" onclick="cambiarPestana('pantalla-visita', this)">
        <i class="bi bi-clock-history"></i><span>Visita</span>
    </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="auxiliar.js"></script>
</body>
</html>
