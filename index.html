<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL MR | Login</title>
    <link rel="stylesheet" href="index.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="wrapper">
        <form id="loginForm">
            <h1>CONTROL MR</h1>
            
            <div class="input-box">
                <input type="text" id="usuario" placeholder="Nombre de usuario" required>
                <i class='bx bxs-user'></i>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Contraseña" required>
                <i class='bx bxs-lock-alt' ></i>
            </div>


            <button type="submit" class="btn" onclick="login(event)">Entrar</button>

            <div id="msg" style="text-align: center; margin-top: 20px; font-weight: 600;"></div>

            
        </form>
    </div>

  

    <script src="index.js"></script>

</body>
</html>
